function drawGraph(g){
  const v=$("#view");
  v.innerHTML=`<div class="graph-wrap"><canvas id="graphCanvas"></canvas>
    <div class="graph-legend"><span class="lg"><i style="background:#2DD4BF"></i>Candidate</span><span class="lg"><i style="background:#C69B3C"></i>Role</span><span class="lg"><i style="background:#7aa2ff"></i>Skill</span><span class="lg"><i style="background:#c98bff"></i>Domain</span></div></div>`;
  const cv=$("#graphCanvas"),ctx=cv.getContext("2d"),wrap=cv.parentElement,dpr=Math.min(window.devicePixelRatio||1,2);
  function size(){cv.width=wrap.clientWidth*dpr;cv.height=wrap.clientHeight*dpr;cv.style.width=wrap.clientWidth+"px";cv.style.height=wrap.clientHeight+"px";}
  size();const W=()=>cv.width/dpr,H=()=>cv.height/dpr;
  const colors={candidate:"#2DD4BF",role:"#C69B3C",skill:"#7aa2ff",domain:"#c98bff"};
  const css=getComputedStyle(document.documentElement);
  const ink=css.getPropertyValue("--ink").trim(),line=css.getPropertyValue("--line").trim(),faint=css.getPropertyValue("--ink-faint").trim();
  const nodes=g.nodes.map(n=>({...n,x:W()/2+(Math.random()-.5)*220,y:H()/2+(Math.random()-.5)*220,vx:0,vy:0,r:(n.group==="candidate"||n.group==="role")?14:8}));
  const idx={};nodes.forEach((n,i)=>idx[n.id]=i);
  const edges=(g.edges||[]).filter(e=>idx[e.from]!=null&&idx[e.to]!=null);
  const deg={};edges.forEach(e=>{deg[e.from]=(deg[e.from]||0)+1;deg[e.to]=(deg[e.to]||0)+1});
  nodes.forEach(n=>{if(n.group==="skill"||n.group==="domain")n.r=8+Math.min(7,(deg[n.id]||0)*1.5);});
  let drag=null,off={x:0,y:0};
  function ptXY(cx,cy){const r=cv.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top};}
  function startAt(p){for(const n of nodes){if(Math.hypot(n.x-p.x,n.y-p.y)<n.r+8){drag=n;off={x:n.x-p.x,y:n.y-p.y};return true;}}return false;}
  cv.onmousedown=e=>{if(startAt(ptXY(e.clientX,e.clientY)))cv.style.cursor="grabbing";};
  window.addEventListener("mousemove",mv);function mv(e){if(!drag)return;const p=ptXY(e.clientX,e.clientY);drag.x=p.x+off.x;drag.y=p.y+off.y;drag.vx=drag.vy=0;}
  window.addEventListener("mouseup",()=>{drag=null;cv.style.cursor="grab";});
  cv.addEventListener("touchstart",e=>{const t=e.touches[0];if(t&&startAt(ptXY(t.clientX,t.clientY)))e.preventDefault();},{passive:false});
  cv.addEventListener("touchmove",e=>{if(!drag)return;const t=e.touches[0];if(!t)return;const p=ptXY(t.clientX,t.clientY);drag.x=p.x+off.x;drag.y=p.y+off.y;drag.vx=drag.vy=0;e.preventDefault();},{passive:false});
  cv.addEventListener("touchend",()=>{drag=null;});
  function step(){
    for(let i=0;i<nodes.length;i++){const a=nodes[i];
      for(let j=i+1;j<nodes.length;j++){const b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||1;const f=2800/(d*d);const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
      a.vx+=(W()/2-a.x)*0.0015;a.vy+=(H()/2-a.y)*0.0015;}
    for(const e of edges){const a=nodes[idx[e.from]],b=nodes[idx[e.to]];let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;const f=(d-92)*0.012;const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const n of nodes){if(n===drag)continue;n.vx*=0.86;n.vy*=0.86;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+6,Math.min(W()-n.r-6,n.x));n.y=Math.max(n.r+6,Math.min(H()-n.r-6,n.y));}
    ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W(),H());
    ctx.strokeStyle=line;ctx.lineWidth=1;
    for(const e of edges){const a=nodes[idx[e.from]],b=nodes[idx[e.to]];ctx.globalAlpha=.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    ctx.globalAlpha=1;ctx.textAlign="center";ctx.textBaseline="middle";
    for(const n of nodes){const c=colors[n.group]||"#888";
      const big=n.group==="candidate"||n.group==="role";
      if(big){ctx.shadowColor=c;ctx.shadowBlur=16;}
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fillStyle=c;ctx.fill();ctx.shadowBlur=0;
      if(big){ctx.lineWidth=2;ctx.strokeStyle=c;ctx.globalAlpha=.3;ctx.beginPath();ctx.arc(n.x,n.y,n.r+5,0,7);ctx.stroke();ctx.globalAlpha=1;}
      ctx.fillStyle=big?ink:faint;ctx.font=(big?"600 12px":"450 10.5px")+" Inter, sans-serif";
      const lbl=n.label.length>22?n.label.slice(0,21)+"…":n.label;ctx.fillText(lbl,n.x,n.y+n.r+10);}
    graphAnim=requestAnimationFrame(step);}
  if(graphAnim)cancelAnimationFrame(graphAnim);step();
  window.addEventListener("resize",()=>{if(state.tab==="skills")size();});
}

/* ---------- Chat ---------- */
/* ---------- AI Agent (orchestrated trace) ---------- */
let agentRunning=false;
const agentTrace=[];
function fmtEl(t0){return ((performance.now()-t0)/1000).toFixed(1)+"s";}
function traceRender(){
  const el=document.querySelector("#agentTrace"); if(!el)return;
  el.innerHTML=agentTrace.map((s,i)=>`
    <div class="step ${s.status}">
      <div class="step-rail"><span class="step-dot"></span>${i<agentTrace.length-1?'<span class="step-line"></span>':''}</div>
      <div class="step-body">
        <div class="step-head"><span class="step-n">STEP ${i+1}</span><span class="step-label">${esc(s.label)}</span>
          <span class="step-status">${s.status==="running"?'<span class="typing"><i></i><i></i><i></i></span><span class="step-el">'+fmtEl(s.t0)+'</span>':s.status==="done"?(s.ms?s.ms+" ms":"done"):s.status==="error"?"failed":""}</span></div>
        ${s.detail?`<div class="step-detail">${s.detail}</div>`:""}
      </div>
    </div>`).join("");
}
let agentTick=null;
function agentTickStart(){clearInterval(agentTick);agentTick=setInterval(()=>{const s=agentTrace.find(x=>x.status==="running");const el=document.querySelector("#agentTrace .step.running .step-el");if(s&&el)el.textContent=fmtEl(s.t0);},250);}
function agentTickStop(){clearInterval(agentTick);agentTick=null;}
function noKeyCard(){return `<div class="card keycard"><div class="kc-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="15" r="4"/><path d="M9.8 12.2 21 1m-4 4 3 3m-6.2-1.8 2.4 2.4"/></svg></div><div><h3 style="margin:0 0 4px">Add your Gemini API key to begin</h3><p class="muted" style="margin:0 0 13px;max-width:440px">TalentLens runs on your own free Gemini key — it stays in your browser and is never sent anywhere else. Paste it in the field at the top right and this unlocks instantly.</p><a class="btn primary" href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Get a free key →</a></div></div>`;}
function stepStart(label){const s={label,status:"running",detail:"",t0:performance.now()};agentTrace.push(s);traceRender();return s;}
function stepDone(s,detail){s.status="done";s.ms=Math.round(performance.now()-s.t0);if(detail!=null)s.detail=detail;traceRender();}
function agentMini(scores){return scores.map((r,i)=>`<div class="mini-rank"><span class="mr-n">${i+1}</span><span style="width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${i===0?"color:var(--gold)":""}">${esc(r._name)}</span><span class="mini-bar"><span style="width:${+r.overall||0}%"></span></span><span class="mono" style="font-size:12px">${esc(r.overall)}</span></div>`).join("");}
function renderAgent(){
  renderFocusHead("");
  const v=$("#view");const jds=selJDs(),cvs=selCVs();
  if(!state.docs.length){v.innerHTML=needDocs("No documents yet","Add candidate CVs and a job description, then run the agent.");bindNd();return;}
  if(!jds.length||!cvs.length){v.innerHTML=needDocs("Need a role and candidates","Select one job description and at least one CV in the rail, then run the agent.");bindNd();return;}
  const jd=jds[0];
  v.innerHTML=`<div class="view-pad">
    <div class="card agent-goal">
      <div class="eyebrow">Agent goal</div>
      <div class="goal-row">
        <input id="agentGoal" value="Find the strongest candidate for ${esc(jd.name)} and justify the recommendation." />
        <button class="btn primary" id="agentRun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"/></svg>Run agent</button>
      </div>
      <p class="muted" style="margin:10px 0 0;font-size:12.5px">The agent runs a multi-step workflow: <b>plan → extract the role's true requirements → score each candidate → cross-check the leader → synthesise a cited recommendation.</b> Each step streams below.</p>
    </div>
    <div id="agentTrace" class="agent-trace"></div>
    <div id="agentResult"></div>
  </div>`;
  $("#agentRun").onclick=runAgent;
}
async function runAgent(){
  if(agentRunning)return;
  if(!state.apiKey){const ar=$("#agentResult");if(ar)ar.innerHTML=noKeyCard();return;}
  agentRunning=true;agentTrace.length=0;agentTickStart();
  const jd=selJDs()[0],cvs=selCVs();
  const goalEl=$("#agentGoal");const goal=goalEl?goalEl.value.trim():"Recommend the best candidate.";
  const btn=$("#agentRun");if(btn){btn.disabled=true;}
  $("#agentResult").innerHTML="";
  try{
    let s=stepStart("Plan the approach");
    const plan=parseJSON(await gemini(`You are an autonomous recruiting agent. Goal: "${goal}". You have one job description and ${cvs.length} candidate CV(s). Output your plan as JSON only: {"steps":["short step", ...]} with 4-6 concise steps you will take.`,{json:true,temp:0.3}));
    stepDone(s,`<ol class="plan">${(plan.steps||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ol>`);

    s=stepStart("Extract the role's true requirements");
    const reqSig="agentreq:"+jd.id;let req=state.cache[reqSig];
    if(!req){req=parseJSON(await gemini(`Extract hiring requirements from this job description. JSON only: {"mustHaves":["..."],"niceToHaves":["..."],"seniority":"...","domain":"..."}. From the text only.
ROLE ${jd.name}: ${jd.pages.map(p=>p.text).join(" ").slice(0,5000)}`,{json:true,temp:0.2}));state.cache[reqSig]=req;}
    stepDone(s,`<div class="eyebrow">Must-haves</div><div class="chips">${(req.mustHaves||[]).map(x=>`<span class="chip good">${esc(x)}</span>`).join("")||'<span class="faint">—</span>'}</div><div class="eyebrow" style="margin-top:10px">Nice-to-have</div><div class="chips">${(req.niceToHaves||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join("")||'<span class="faint">—</span>'}</div>`);

    s=stepStart("Score each candidate against the requirements");
    const scores=[];
    for(const cv of cvs){
      const sig="agentscore:"+jd.id+":"+cv.id;let r=state.cache[sig];
      if(!r){r=parseJSON(await gemini(`Score this candidate against the role requirements. JSON only: {"overall":0-100,"verdict":"strong fit"|"possible fit"|"weak fit","topStrength":"3-6 words","topGap":"3-6 words"}. Honest, evidence-based, from text only.
REQUIREMENTS must-haves: ${(req.mustHaves||[]).join("; ")}
ROLE ${jd.name}: ${jd.pages.map(p=>p.text).join(" ").slice(0,2500)}
CANDIDATE ${cv.name}: ${cv.pages.map(p=>p.text).join(" ").slice(0,4000)}`,{json:true,temp:0.2}));r._name=cv.name;state.cache[sig]=r;}
      scores.push(r);scores.sort((a,b)=>b.overall-a.overall);s.detail=agentMini(scores);traceRender();
    }
    scores.sort((a,b)=>b.overall-a.overall);stepDone(s,agentMini(scores));

    s=stepStart("Cross-check the leading candidate");
    const top=scores[0];const topDoc=state.docs.find(d=>d.name===top._name);
    const cross=parseJSON(await gemini(`The leading candidate is "${top._name}". Verify against the role's must-haves. JSON only: {"unmet":["must-haves not evidenced"],"risks":["things to probe in interview"],"confidence":"high"|"medium"|"low"}. From text only.
MUST-HAVES: ${(req.mustHaves||[]).join("; ")}
CANDIDATE ${top._name}: ${(topDoc?topDoc.pages:[]).map(p=>p.text).join(" ").slice(0,4000)}`,{json:true,temp:0.2}));
    stepDone(s,`<div class="muted" style="margin-bottom:8px">Confidence in the leader: <b style="color:var(--ink)">${esc(cross.confidence||"—")}</b></div><div class="eyebrow">Unmet must-haves</div><div class="chips">${(cross.unmet||[]).map(x=>`<span class="chip gap">${esc(x)}</span>`).join("")||'<span class="chip good">none</span>'}</div><div class="eyebrow" style="margin-top:10px">Risks to probe</div><div class="chips">${(cross.risks||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join("")||'<span class="faint">—</span>'}</div>`);

    s=stepStart("Synthesise the recommendation");
    const summary=await gemini(`Write a concise hiring recommendation (4-6 sentences) for the goal: "${goal}". Rank the candidates, justify the top pick against the role's requirements, and name the single most important thing to probe in interview. Reference candidates by name. Plain text, no markdown headers.
SCORES: ${scores.map(x=>x._name+" "+x.overall+" ("+x.verdict+")").join("; ")}
LEADER RISKS: ${(cross.risks||[]).join("; ")||"none noted"}`,{temp:0.4});
    stepDone(s,"");

    $("#agentResult").innerHTML=`<div class="card final-card" style="margin-top:6px">
      <div class="eyebrow">Agent recommendation</div>
      <div class="scorewrap" style="margin:12px 0 2px">${halo("md",top.overall,"fit")}
        <div style="flex:1;min-width:0"><div class="between"><h3 data-jump="${esc(top._name)}" style="cursor:pointer">${esc(top._name)}</h3><span class="verdict ${vClass(top.verdict)}">${esc(top.verdict)}</span></div>
        <p class="muted" style="margin:6px 0 0">${esc(summary)}</p></div></div>
      <div class="eyebrow" style="margin-top:16px">Final ranking</div>${agentMini(scores)}
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        <button class="btn primary" data-go-int="1">Interview kit for the leader →</button>
        <button class="btn" data-go2b="shortlist">Open full shortlist →</button>
      </div></div>`;
    const r1=$("#agentResult");
    r1.querySelectorAll("[data-go2b]").forEach(b=>b.onclick=()=>goTab(b.getAttribute("data-go2b")));
    r1.querySelectorAll("[data-go-int]").forEach(b=>b.onclick=()=>{const sel=$("#ivPick");goTab("interview");});
  }catch(e){
    const retryBtn=`<button class="btn" id="agentRetry" style="margin-top:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg>Retry</button>`;
    if(agentTrace.length){const last=agentTrace[agentTrace.length-1];last.status="error";last.detail=`<div style="color:var(--bad);margin-bottom:2px">${esc(e.message)}</div><div class="faint" style="font-size:11.5px">Completed steps are cached — retry resumes from here.</div>${retryBtn}`;traceRender();}
    else $("#agentResult").innerHTML=`<div class="card"><p class="muted" style="margin:0">${esc(e.message)}</p>${retryBtn}</div>`;
    const rt=$("#agentRetry");if(rt)rt.onclick=runAgent;
  }finally{agentRunning=false;agentTickStop();const b=$("#agentRun");if(b){b.disabled=false;b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg>Re-run agent`;}}
}


function renderScope(){const sel=selectedDocs();const sc=$("#scope");
  if(!sel.length){sc.innerHTML="No documents selected — general knowledge mode.";$("#chatInput").placeholder="Ask anything…";}
  else{sc.innerHTML=`Grounded in <b>${sel.length} doc${sel.length>1?"s":""}</b> · ${selCVs().length} CV · ${selJDs().length} JD`;$("#chatInput").placeholder="Ask about the selected documents…";}}
function renderChat(){const sc=$("#chatScroll");
  if(!state.chat.length){sc.innerHTML=`<div class="msg a"><div class="who">TalentLens</div><div class="bubble">Your recruitment co-pilot. Select documents and I answer with page citations — or ask anything for a general answer.
    <div class="suggest"><button>Summarise this candidate in 3 bullets</button><button>What are the must-have requirements in this role?</button><button>Which candidate is strongest, and why?</button></div></div></div>`;
    sc.querySelectorAll(".suggest button").forEach(b=>b.onclick=()=>{$("#chatInput").value=b.textContent;send();});return;}
  sc.innerHTML=state.chat.map(m=>{
    if(m.role==="u")return `<div class="msg u">${escapeHtml(m.text)}</div>`;
    if(m.role==="typing")return `<div class="msg a"><div class="who">TalentLens</div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div></div>`;
    return `<div class="msg a"><div class="who">TalentLens</div><div class="bubble">${m.off?`<div class="offdoc">⚡ General knowledge — outside your documents</div>`:""}${m.html}</div></div>`;
  }).join("");
  sc.querySelectorAll(".cite").forEach(c=>c.onclick=()=>jumpTo(c.dataset.name,+c.dataset.page));
  sc.scrollTop=sc.scrollHeight;}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function formatAnswer(txt){let off=false;
  if(/^\s*\[OFFDOC\]/.test(txt)){off=true;txt=txt.replace(/^\s*\[OFFDOC\]\s*/,"");}
  let html=escapeHtml(txt);
  html=html.replace(/\(([^()]{1,60}?)[,·]?\s*p\.?\s*(\d+)\)/gi,(m,name,page)=>`<span class="cite" data-name="${name.trim().replace(/"/g,'')}" data-page="${page}">¶ ${name.trim()} p.${page}</span>`);
  html=html.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\n\s*[-•]\s+/g,"<br>• ").replace(/\n{2,}/g,"<br><br>").replace(/\n/g,"<br>");
  return{html,off};}
async function send(){const inp=$("#chatInput");const q=inp.value.trim();if(!q)return;
  inp.value="";inp.style.height="auto";
  state.chat.push({role:"u",text:q});state.chat.push({role:"typing"});renderChat();
  const sel=selectedDocs();
  try{let prompt,system;
    if(sel.length){system=`You are TalentLens, a precise recruitment analyst. Answer using ONLY the provided documents when the question relates to them. Cite evidence inline as (DocName, p.N) using exact names/pages from context. If the question is general and unrelated to the documents, you MAY answer from general knowledge but MUST prefix the whole reply with [OFFDOC]. Be concise. Never invent candidates, facts, or page numbers.`;
      prompt=`CONTEXT DOCUMENTS:\n${docContext(sel)}\n\nQUESTION: ${q}`;}
    else{system=`You are TalentLens, a sharp recruitment co-pilot. No documents loaded. Answer from general knowledge and prefix with [OFFDOC].`;prompt=q;}
    const ans=await gemini(prompt,{system,temp:0.4});const{html,off}=formatAnswer(ans);
    state.chat.pop();state.chat.push({role:"a",html,off});renderChat();
  }catch(e){state.chat.pop();state.chat.push({role:"a",html:`<span style="color:var(--bad)">${e.message}</span>`,off:false});renderChat();}}

/* ---------- command palette ---------- */
const CMDS=[
  ...STAGES.map(s=>({label:"Go to "+s.label,icon:s.icon,run:()=>goTab(s.id),num:s.num})),
  {label:"Add documents",icon:`<path d="M12 5v14M5 12h14"/>`,run:()=>$("#fileInput").click()},
  {label:"Select all documents",icon:`<path d="M4 12l5 5L20 6"/>`,run:()=>$("#selectAll").click()},
  {label:"Clear selection",icon:`<path d="M6 6l12 12M18 6L6 18"/>`,run:()=>$("#clearSel").click()},
  {label:"Toggle theme",icon:`<circle cx="12" cy="12" r="4"/>`,run:()=>$("#themeBtn").click()},
  {label:"Clear conversation",icon:`<path d="M3 6h18M8 6V4h8v2"/>`,run:()=>$("#clearChat").click()}
];
let cmdSel=0,cmdFiltered=CMDS;
function openCmdk(){$("#cmdk").classList.add("open");$("#cmdkInput").value="";cmdFiltered=CMDS;cmdSel=0;renderCmd();setTimeout(()=>$("#cmdkInput").focus(),20);}
function closeCmdk(){$("#cmdk").classList.remove("open");}
function renderCmd(){$("#cmdkList").innerHTML=cmdFiltered.map((c,i)=>`<div class="cmd ${i===cmdSel?"sel":""}" data-i="${i}"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg></span><span>${c.label}</span>${c.num?`<span class="num">${c.num}</span>`:""}</div>`).join("")||`<div class="cmd faint">No matches</div>`;
  $("#cmdkList").querySelectorAll("[data-i]").forEach(el=>el.onclick=()=>{cmdFiltered[+el.dataset.i].run();closeCmdk();});}
$("#cmdkOpen").onclick=openCmdk;
$("#cmdkInput")&&$("#cmdkInput").addEventListener("input",e=>{const q=e.target.value.toLowerCase();cmdFiltered=CMDS.filter(c=>c.label.toLowerCase().includes(q));cmdSel=0;renderCmd();});
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();$("#cmdk").classList.contains("open")?closeCmdk():openCmdk();return;}
  if(!$("#cmdk").classList.contains("open"))return;
  if(e.key==="Escape")closeCmdk();
  else if(e.key==="ArrowDown"){e.preventDefault();cmdSel=Math.min(cmdFiltered.length-1,cmdSel+1);renderCmd();}
  else if(e.key==="ArrowUp"){e.preventDefault();cmdSel=Math.max(0,cmdSel-1);renderCmd();}
  else if(e.key==="Enter"&&cmdFiltered[cmdSel]){cmdFiltered[cmdSel].run();closeCmdk();}});
$("#cmdk").addEventListener("click",e=>{if(e.target.id==="cmdk")closeCmdk();});

/* ---------- wiring ---------- */
$("#fileInput").addEventListener("change",e=>{ingest([...e.target.files]);e.target.value="";});
$("#drop").addEventListener("click",()=>$("#fileInput").click());
["dragover","dragenter"].forEach(ev=>$("#drop").addEventListener(ev,e=>{e.preventDefault();$("#drop").classList.add("drag");}));
["dragleave","drop"].forEach(ev=>$("#drop").addEventListener(ev,e=>{e.preventDefault();$("#drop").classList.remove("drag");}));
$("#drop").addEventListener("drop",e=>ingest([...e.dataTransfer.files]));
$("#selectAll").onclick=()=>{state.docs.forEach(d=>d.sel=true);renderDocs();renderScope();refreshTab();};
$("#clearSel").onclick=()=>{state.docs.forEach(d=>d.sel=false);renderDocs();renderScope();refreshTab();};

const keyInput=$("#apiKey");keyInput.value=state.apiKey;let keyTimer;
keyInput.addEventListener("input",()=>{state.apiKey=keyInput.value.trim();store.set("tl_key",state.apiKey);clearTimeout(keyTimer);$("#keyDot").className="dot";keyTimer=setTimeout(checkKey,700);});

$("#themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme");const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);store.set("tl_theme",next);setThemeIcon(next);if(state.tab==="skills")refreshTab();};
function setThemeIcon(t){$("#themeIcon").innerHTML=t==="dark"?`<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>`:`<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>`;}
$("#clearChat").onclick=()=>{state.chat=[];renderChat();};
const ci=$("#chatInput");
ci.addEventListener("input",()=>{ci.style.height="auto";ci.style.height=Math.min(ci.scrollHeight,130)+"px";});
ci.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
$("#sendBtn").onclick=send;
$("#view").addEventListener("click",e=>{const t=e.target.closest("[data-jump]");if(t)jumpTo(t.getAttribute("data-jump"),1);});
$("#nav").addEventListener("mousemove",e=>{const it=e.target.closest(".navitem");if(!it)return;const r=it.getBoundingClientRect();it.style.setProperty("--mx",(e.clientX-r.left)+"px");it.style.setProperty("--my",(e.clientY-r.top)+"px");});

/* mobile drawers */
function closeDrawers(){document.querySelector(".rail").classList.remove("open");document.querySelector(".chat").classList.remove("open");$("#scrim").classList.remove("show");}
function openDrawer(sel){const isOpen=document.querySelector(sel).classList.contains("open");closeDrawers();if(!isOpen){document.querySelector(sel).classList.add("open");$("#scrim").classList.add("show");}}
$("#railToggle").onclick=()=>openDrawer(".rail");
$("#chatToggle").onclick=()=>openDrawer(".chat");
$("#scrim").onclick=closeDrawers;
const isMobile=()=>window.matchMedia("(max-width:920px)").matches;

/* init */
(function init(){
  const th=store.get("tl_theme","dark");document.documentElement.setAttribute("data-theme",th);setThemeIcon(th);
  renderNav();renderDocs();renderScope();renderChat();refreshTab();
  if(state.apiKey)checkKey();
})();
</script>
